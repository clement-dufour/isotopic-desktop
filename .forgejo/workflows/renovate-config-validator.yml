name: renovate-config-validator
on:
  workflow_dispatch:
  push:
    paths:
      - 'renovate.json'
      - '.forgejo/workflows/renovate-config-validator.yml'

jobs:
  renovate-config-validator:
    runs-on: podman-unprivileged
    container:
      image: ghcr.io/renovatebot/renovate:43@sha256:98ec7a9df71f91f1d137cfb26c6028e55b2e8c5adf8fcb70201eceb6d361834e
    strategy:
      fail-fast: true
      matrix:
        config-file:
          - 'renovate.json'

    steps:
      - name: checkout repository
        uses: https://code.forgejo.org/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: validate renovate configuration
        env:
          CONFIG_FILE: ${{ matrix.config-file }}
        shell: bash --noprofile --norc -e -o nounset -o pipefail {0}
        run: |
          renovate-config-validator --strict --no-global "${CONFIG_FILE}"
