name: Build image
on:
  merge_group:
  pull_request:
    branches:
      - main
    paths:
      - '**'
      - '!**/README.org'
      - '!.github/**'
      - '.github/workflows/build.yml'
  push:
    branches:
      - main
    paths:
      - '**'
      - '!**/README.org'
      - '!.github/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_TAGS: latest ${{ github.sha }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-push:
    name: Build image
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false

    permissions:
      contents: read
      packages: write # needed for pushing package to GHCR
      #id-token: write # needed for signing the images with GitHub OIDC Token

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Change containers signature policy
        run: |
          mkdir -p "${HOME}/.config/containers/registries.d"

          cat << EOF > "${HOME}/.config/containers/registries.d/default-docker.yaml"
          default-docker:
            use-sigstore-attachments: true
          EOF

          cat << EOF > "${HOME}/.config/containers/policy.json"
          {
            "default": [
              {
                "type": "reject"
              }
            ],
            "transports": {
              "docker": {
                "quay.io/fedora-ostree-desktops": [
                  {
                    "type": "sigstoreSigned",
                    "keyData": "$(base64 -w 0 "${GITHUB_WORKSPACE}/quay.io-fedora-ostree-desktops.pub")",
                    "signedIdentity": {
                        "type": "matchRepository"
                    }
                  }
                ]
              }
            }
          }
          EOF

      - name: Build
        id: build
        shell: bash
        run: |
          set -oue pipefail

          image_with_tag=""
          for tag in ${IMAGE_TAGS}; do
            if [ -z "${image_with_tag}" ]; then
              image_with_tag="${IMAGE_NAME}:${tag}"
              buildah bud --file "${GITHUB_WORKSPACE}/Containerfile" --format oci --tag "${image_with_tag}" "${GITHUB_WORKSPACE}"
            else
              buildah tag "${image_with_tag}" "${IMAGE_NAME}:${tag}"
            fi
          done

          {
            printf 'image-with-tag=%s\n' "${image_with_tag}"
          } >> ${GITHUB_OUTPUT}

      - name: Perform static analysis checks
        env:
          IMAGE_WITH_TAG: ${{ steps.build.outputs.image-with-tag }}
        run: |
          podman run --rm localhost/${IMAGE_WITH_TAG} bootc container lint --fatal-warnings

      - name: Login to container registry
        id: login
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        run: |
          podman login --username "${REGISTRY_USER}" --password "${REGISTRY_PASSWORD}" "${REGISTRY}"
          ln --symbolic --force ${XDG_RUNTIME_DIR}/containers/auth.json ${HOME}/.docker/config.json

      - name: Push to registry
        id: push
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -oue pipefail

          for tag in ${IMAGE_TAGS}; do
            podman push --digestfile digest.txt "${IMAGE_NAME}:${tag}" "${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}:${tag}"
          done

          {
            printf 'digest=%s\n' "$(head -n 1 digest.txt)"
          } >> ${GITHUB_OUTPUT}

      - name: Sign image with a key
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}@${DIGEST}"

      - name: Logout from container registry
        if: (steps.login.outcome == 'success' || steps.login.outcome == 'failure' )
        run: |
          podman logout "${REGISTRY}"
